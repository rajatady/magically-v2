name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: magically
          POSTGRES_PASSWORD: magically
          POSTGRES_DB: magically_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U magically"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://magically:magically@localhost:5432/magically_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.3"

      - run: bun install --frozen-lockfile

      - name: Build shared
        working-directory: packages/shared
        run: bun run build

      - name: Run migrations
        working-directory: packages/runtime
        run: bun run db:migrate

      - name: Test runtime
        working-directory: packages/runtime
        run: bun run test

      - name: Test CLI
        working-directory: packages/cli
        run: bun run test

      - name: Test agent-sdk
        working-directory: packages/agent-sdk
        run: bun run test

      - name: Test widget-dsl
        working-directory: packages/widget-dsl
        run: bun run test

      - name: Test web
        working-directory: apps/web
        run: bun run test
