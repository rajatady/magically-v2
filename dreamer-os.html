<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2f; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a40; }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-100%); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.2); }
    50% { box-shadow: 0 0 20px 4px rgba(249, 115, 22, 0.15); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-4px); }
  }
  @keyframes typewriter {
    from { width: 0; }
    to { width: 100%; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes widgetAppear {
    from { opacity: 0; transform: scale(0.9) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
  .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
  .animate-slide-right { animation: slideInRight 0.4s ease-out forwards; }
  .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }
  .animate-widget { animation: widgetAppear 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

  .stagger-1 { animation-delay: 0.05s; opacity: 0; }
  .stagger-2 { animation-delay: 0.1s; opacity: 0; }
  .stagger-3 { animation-delay: 0.15s; opacity: 0; }
  .stagger-4 { animation-delay: 0.2s; opacity: 0; }
  .stagger-5 { animation-delay: 0.25s; opacity: 0; }
  .stagger-6 { animation-delay: 0.3s; opacity: 0; }
  .stagger-7 { animation-delay: 0.35s; opacity: 0; }
  .stagger-8 { animation-delay: 0.4s; opacity: 0; }

  /* Glass morphism */
  .glass {
    background: rgba(20, 20, 22, 0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }
  .glass-light {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
  }

  /* Noise texture overlay */
  .noise::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    border-radius: inherit;
  }

  /* Widget hover */
  .widget-card {
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .widget-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
  }

  /* Sidebar icon hover */
  .sidebar-icon {
    transition: all 0.2s ease;
  }
  .sidebar-icon:hover {
    transform: scale(1.1);
  }
  .sidebar-icon.active {
    transform: scale(1.05);
  }

  /* Sidekick panel */
  .sidekick-panel {
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Agent view overlay */
  .agent-overlay {
    animation: fadeIn 0.2s ease-out;
  }
  .agent-overlay .agent-content {
    animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Feed item */
  .feed-item {
    transition: all 0.2s ease;
  }
  .feed-item:hover {
    background: rgba(255,255,255,0.03);
  }

  /* Gradient mesh background */
  .mesh-gradient {
    background:
      radial-gradient(ellipse at 20% 50%, rgba(249, 115, 22, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(168, 85, 247, 0.04) 0%, transparent 50%);
  }

  /* Status dot pulse */
  .status-pulse {
    animation: pulseGlow 3s ease-in-out infinite;
  }

  /* Typing indicator */
  .typing-dot {
    animation: float 1.4s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>

// --- Sidebar (the OS dock) ---

// --- Sidekick Panel ---
function SidekickPanel({ open }) {
  const [messages, setMessages] = useState([
    { role: 'assistant', content: 'Good afternoon! I see you have a meeting with Ali Rougani in 23 minutes. I\'ve already prepared a briefing — want me to pull it up?' },
  ]);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);

  const handleSend = () => {
    if (!input.trim()) return;
    setMessages(prev => [...prev, { role: 'user', content: input }]);
    setInput('');
    setIsTyping(true);

    setTimeout(() => {
      setIsTyping(false);
      setMessages(prev => [...prev, {
        role: 'assistant',
        content: 'I\'ll pull up the Calendar Hero briefing for Ali. He was last onboarded to the design system last Tuesday. I also found 2 related Slack threads you might want to reference. Want me to send him tonight\'s dinner menu too? 😄',
        tools: ['Calendar Hero', 'Slack']
      }]);
    }, 2000);
  };

  if (!open) return null;

  return (
    <div className="sidekick-panel w-[380px] h-full border-l border-shell-border/50 bg-shell-surface/95 flex flex-col animate-slide-right relative z-30">
      {/* Header */}
      <div className="px-5 py-4 border-b border-shell-border/40">
        <div className="flex items-center gap-3">
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-warm-500 to-warm-600 flex items-center justify-center shadow-md shadow-warm-500/20">
            <span className="text-sm">✦</span>
          </div>
          <div>
            <h3 className="text-sm font-semibold text-shell-text">Sidekick</h3>
            <p className="text-[10px] text-shell-muted">Access to all your agents & tools</p>
          </div>
        </div>
      </div>

      {/* Messages */}
      <div className="flex-1 overflow-y-auto px-5 py-4 space-y-4">
        {messages.map((msg, i) => (
          <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`}>
            <div className={`max-w-[85%] px-4 py-3 rounded-2xl text-sm leading-relaxed
              ${msg.role === 'user'
                ? 'bg-warm-500/20 text-shell-text rounded-br-md'
                : 'bg-shell-elevated/80 text-shell-text/85 rounded-bl-md border border-shell-border/20'}`}>
              {msg.content}
              {msg.tools && (
                <div className="flex items-center gap-1.5 mt-2 pt-2 border-t border-shell-border/20">
                  <span className="text-[10px] text-shell-muted">Used:</span>
                  {msg.tools.map((tool, j) => (
                    <span key={j} className="text-[10px] px-2 py-0.5 rounded-full bg-shell-border/30 text-shell-muted">{tool}</span>
                  ))}
                </div>
              )}
            </div>
          </div>
        ))}
        {isTyping && (
          <div className="flex justify-start animate-fade-in">
            <div className="px-4 py-3 rounded-2xl rounded-bl-md bg-shell-elevated/80 border border-shell-border/20">
              <div className="flex items-center gap-1.5">
                <div className="typing-dot w-1.5 h-1.5 rounded-full bg-shell-muted"></div>
                <div className="typing-dot w-1.5 h-1.5 rounded-full bg-shell-muted"></div>
                <div className="typing-dot w-1.5 h-1.5 rounded-full bg-shell-muted"></div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Input */}
      <div className="px-4 py-3 border-t border-shell-border/40">
        <div className="flex items-end gap-2 bg-shell-elevated rounded-xl border border-shell-border/30 focus-within:border-warm-500/30 transition-colors">
          <textarea
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }}}
            placeholder="Ask Sidekick anything..."
            className="flex-1 bg-transparent px-4 py-3 text-sm text-shell-text placeholder:text-shell-muted/40 resize-none outline-none max-h-[100px]"
            rows={1}
          />
          <button
            onClick={handleSend}
            className={`p-2.5 m-1 rounded-lg transition-all ${
              input.trim()
                ? 'bg-warm-500 text-white hover:bg-warm-600'
                : 'text-shell-muted/30'
            }`}
          >
            <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
        <div className="flex items-center gap-3 mt-2 px-1">
          <button className="text-[10px] text-shell-muted hover:text-shell-text transition-colors">📎 Attach</button>
          <button className="text-[10px] text-shell-muted hover:text-shell-text transition-colors">🎤 Voice</button>
          <button className="text-[10px] text-shell-muted hover:text-shell-text transition-colors">📷 Photo</button>
        </div>
      </div>
    </div>
  );
}

          {[...AGENTS,
            { id: 'burrito', name: 'BurritoQuest', icon: '🌯', color: '#f59e0b', description: '100% completion on SF burritos' },
            { id: 'ramble', name: 'Ramble Wrangler', icon: '🎙️', color: '#6366f1', description: 'Voice notes → structured Google Docs' },
            { id: 'enhance', name: 'Enhance', icon: '🖼️', color: '#ec4899', description: 'AI image upscaling with pirate theme' },
            { id: 'storytime', name: 'StoryTime', icon: '📖', color: '#8b5cf6', description: 'Personalized bedtime stories for kids' },
          ].map((agent, i) => (
            <div key={agent.id} className={`animate-widget stagger-${Math.min(i % 8 + 1, 8)}`}>
              <button
                onClick={() => onOpenAgent(agent.id)}
                className="w-full flex items-start gap-4 p-5 rounded-xl bg-shell-surface/60 border border-shell-border/30 hover:border-shell-border/60 hover:bg-shell-surface transition-all text-left group"
              >
                <div className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl flex-shrink-0" style={{ background: agent.color + '20' }}>
                  {agent.icon}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold text-shell-text/85 group-hover:text-shell-text transition-colors">{agent.name}</div>
                  <div className="text-xs text-shell-muted mt-0.5 leading-relaxed">{agent.description}</div>
                  <div className="flex items-center gap-3 mt-2">
                    <span className="text-[10px] text-shell-muted">⭐ 4.8</span>
                    <span className="text-[10px] text-shell-muted">👥 1.2k users</span>
                    <span className="text-[10px] text-warm-400 font-medium cursor-pointer hover:text-warm-300">Remix →</span>
                  </div>
                </div>
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================
// APP SHELL
// ============================================
function App() {
  const [activeView, setActiveView] = useState('home');
  const [sidekickOpen, setSidekickOpen] = useState(false);
  const [openAgent, setOpenAgent] = useState(null);

  const handleNavigate = useCallback((view, agentId) => {
    if (view === 'agent') {
      setOpenAgent(agentId);
    } else {
      setActiveView(view);
      setOpenAgent(null);
    }
  }, []);

  const renderView = () => {
    switch (activeView) {
      case 'home': return <HomeView onOpenAgent={setOpenAgent} feedItems={FEED_ITEMS} />;
      case 'feed': return <FeedView items={FEED_ITEMS} onOpenAgent={(id) => setOpenAgent(id)} />;
      case 'build': return <BuildView />;
      case 'gallery': return <GalleryView onOpenAgent={setOpenAgent} />;
      default: return <HomeView onOpenAgent={setOpenAgent} feedItems={FEED_ITEMS} />;
    }
  };

  return (
    <div className="h-screen w-screen flex overflow-hidden bg-shell-bg">
      {/* Sidebar — the OS dock */}
      <Sidebar
        activeView={activeView}
        onNavigate={handleNavigate}
        onToggleSidekick={() => setSidekickOpen(!sidekickOpen)}
        sidekickOpen={sidekickOpen}
        agents={AGENTS}
      />

      {/* Main content */}
      <div className="flex-1 flex overflow-hidden">
        <div className="flex-1 overflow-hidden">
          {renderView()}
        </div>

        {/* Sidekick panel */}
        <SidekickPanel open={sidekickOpen} />
      </div>

      {/* Agent overlay */}
      {openAgent && (
        <AgentView agent={openAgent} onClose={() => setOpenAgent(null)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
